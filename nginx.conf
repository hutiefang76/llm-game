# ==============================================================================
# Nginx 配置 - 梯度下降 Demo 静态站点
# 适用场景：腾讯云 CVM / 轻量应用服务器 自建 Nginx
# 部署位置：/etc/nginx/conf.d/gradient-descent.conf
# ==============================================================================

# 启用 gzip 压缩（减小 HTML/CSS/JS 传输体积）
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml;

server {
    listen       80;
    listen       [::]:80;

    # ⚠️ 替换成你的实际域名（备案后），未备案先用 _ 匹配所有
    server_name  _;

    # 站点根目录（指向你上传 index.html 的目录）
    root         /var/www/gradient-descent;
    index        index.html;

    # 安全相关响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # 主入口
    location / {
        try_files $uri $uri/ /index.html;
    }

    # favicon 和静态资源缓存 1 年（带 hash 才安全；这里 favicon 内容稳定，OK）
    location = /favicon.svg {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML 不缓存（保证更新立即生效）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 自定义 404 页面
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # 屏蔽常见敏感路径
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}

