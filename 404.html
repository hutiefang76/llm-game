<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#b44f2d" />
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>404 · 这条路径下没有数据点 — 梯度下降 Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #1e1b16;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 32%),
        radial-gradient(circle at bottom right, rgba(47, 107, 95, 0.15), transparent 28%),
        linear-gradient(135deg, #f8f2e8 0%, #efe3d0 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      background: rgba(255, 250, 241, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 24px 60px rgba(66, 41, 19, 0.15);
      border-radius: 24px;
      padding: 36px 32px;
      text-align: center;
    }
    .code {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #b44f2d;
      line-height: 1;
      margin: 0 0 10px;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }
    p {
      color: #62594e;
      line-height: 1.7;
      margin: 0 0 22px;
    }
    a.back {
      display: inline-block;
      background: #b44f2d;
      color: #fffaf6;
      padding: 12px 22px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    a.back:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 20px rgba(47, 34, 20, 0.18);
    }
    .formula {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px dashed #d9c8b3;
      font-size: 13px;
      color: #62594e;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="code">404</p>
    <h1>这条路径下没有数据点</h1>
    <p>梯度下降可以拟合一切，但它拟合不出一条不存在的 URL 😅<br/>回到首页继续训练你的模型吧。</p>
    <a class="back" href="./">← 回到首页</a>
    <div class="formula">Loss(this_page) = ∞</div>
  </main>
</body>
</html>
