# ai.hutiefang.com · 梯度下降可视化 Demo
# 静态站点 - HTTP→HTTPS 重定向 - 复用现有 Let's Encrypt 证书

server {
    listen 80;
    listen [::]:80;
    server_name ai.hutiefang.com;

    # Let's Encrypt 续期验证
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html/ai.hutiefang.com;
    }

    # 其余全部跳 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ai.hutiefang.com;

    ssl_certificate     /etc/letsencrypt/live/ai.hutiefang.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.hutiefang.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /www/sites/gradient-descent;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /favicon.svg {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    error_page 404 /404.html;
    location = /404.html {
        root /www/sites/gradient-descent;
        internal;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
